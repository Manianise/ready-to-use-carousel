<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel — demo</title>

  <!-- Material Symbols Outlined (arrow icons) -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <!-- Carousel styles -->
  <link rel="stylesheet" href="carousel/carousel.css" />

  <style>
    body {
      font-family: sans-serif;
      background: #f4f0eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px 20px;
    }

    h2 { margin: 0; color: #4a4a37; }

    /* Give each demo carousel a max-width */
    .demo-wrap {
      width: 100%;
      max-width: 700px;
    }
  </style>
</head>
<body>

  <!-- ── Demo 1 : default colors ──────────────────────────────────────────── -->
  <div class="demo-wrap">
    <h2>Default colors</h2>
    <div id="carousel-1"></div>
  </div>

  <!-- ── Demo 2 : custom colors ───────────────────────────────────────────── -->
  <div class="demo-wrap">
    <h2>Custom colors</h2>
    <div id="carousel-2"></div>
  </div>

  <script type="module">
    import { Carousel } from './carousel/carousel.js';

    // ── Images arrays ────────────────────────────────────────────────────────
    // String shorthand — alt text is auto-generated
    const images1 = [
      'https://picsum.photos/seed/a/800/500',
      'https://picsum.photos/seed/b/800/500',
      'https://picsum.photos/seed/c/800/500',
    ];

    // Object form — supply your own alt text
    const images2 = [
      { src: 'https://picsum.photos/seed/d/800/500', alt: 'Salon lumineux' },
      { src: 'https://picsum.photos/seed/e/800/500', alt: 'Cuisine équipée' },
      { src: 'https://picsum.photos/seed/f/800/500', alt: 'Chambre principale' },
      { src: 'https://picsum.photos/seed/g/800/500', alt: 'Terrasse' },
    ];

    // ── Carousel 1 — default colors ──────────────────────────────────────────
    new Carousel('#carousel-1', images1);

    // ── Carousel 2 — custom colors ───────────────────────────────────────────
    new Carousel('#carousel-2', images2, {
      dotColor:        '#c9d6e3',
      dotActiveColor:  '#2c6fad',
      arrowColor:      '#2c6fad',
      autoPlayInterval: 5000,
    });
  </script>

</body>
</html>
